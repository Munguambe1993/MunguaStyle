<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>MunguaStyle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HERO -->
<header class="hero">
    <div class="overlay">
        <h1>MunguaStyle</h1>
        <h2>A MunguaStyle e a sua loja</h2>
    </div>
</header>

<!-- NAV -->
<nav class="nav">
    <input type="text" id="search" placeholder="Pesquisar..." onkeyup="searchProduct()">
    <select onchange="filterCategory(this.value)">
        <option value="all">Todas</option>
        <option value="roupa">Roupas</option>
        <option value="calcado">Calçados</option>
    </select>
</nav>

<!-- PRODUTOS -->
<secti.on id="products" class="products"></section>

<!-- MODAL -->
<div id="productModal" class="modal hidden">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✖</span>
        <img id="modalImg">
        <h3 id="modalName"></h3>
        <p id="modalPrice"></p>
        <p id="modalDesc"></p>

        <label>Quantidade</label>
        <input type="number" id="qty" value="1" min="1">

        <button onclick="confirmAdd()">Adicionar ao carrinho</button>
    </div>
</div>

<!-- CARRINHO -->
<section class="cart">
    <h2>🛒 Carrinho</h2>
    <ul id="cart-items"></ul>
    <p>Total: <b id="total">0</b> MZN</p>

    <input type="text" id="mpesa" placeholder="Número M-Pesa (9 dígitos)">
    <button onclick="pay()">Pagar Agora</button>
</section>

<script src="js/script.js"></script>
</body>
</html>
